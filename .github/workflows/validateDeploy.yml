name: Convert and Deploy Modified Sigma Rules

on:
  push:
    paths:
      - "rules/**.yml"
  pull_request:
    paths:
      - "rules/**.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate Sigma rules
        uses: SigmaHQ/sigma-rules-validator@v1
        with:
          paths: |-
            ./rules
          schemaFile: ${{ github.workspace }}/sigma-schema.json

  convert-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sigma-cli requests
          sigma plugin install splunk

      - name: Find Changed Files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD -- rules/ | grep "\.yml$" || echo "")
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Convert and Deploy
        run: |
          if [ -z "${{ steps.changed-files.outputs.changed_files }}" ]; then
            echo "Dəyişən fayl yoxdur."
            exit 0
          fi

          success=0
          failure=0

          for file in ${{ steps.changed-files.outputs.changed_files }}; do
            rule_name=$(basename "$file" .yml)
            echo "İşlənir: $file"

            spl_query=$(sigma convert -t splunk -f default "$file" --without-pipeline)

            if [ -z "$spl_query" ]; then
              echo "✗ SPL query yaranmadı: $file"
              failure=$((failure + 1))
              continue
            fi

            python scripts/deploy_to_splunk.py \
              --url "$SPLUNK_URL" \
              --token "$SPLUNK_TOKEN" \
              --rule "$rule_name" \
              --query "$spl_query" \
              --actions "log"

            if [ $? -eq 0 ]; then
              success=$((success + 1))
            else
              failure=$((failure + 1))
            fi
          done

          echo "Uğurlu: $success | Uğursuz: $failure"
          exit 0
        shell: bash
        env:
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_API_TOKEN }}
